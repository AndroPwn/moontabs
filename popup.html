<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Moontabs</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      width:300px;
      font-family:system-ui,sans-serif;
      background:#0a0612;
      color:#c8c8e8;
      padding:0;
    }
    .header{
      padding:14px 16px;
      border-bottom:1px solid #1e1e35;
      display:flex;align-items:center;justify-content:space-between;
    }
    .brand{display:flex;align-items:center;gap:10px}
    .logo{width:28px;height:28px;border-radius:8px;object-fit:cover}
    .brand-text h1{font-size:13px;font-weight:600;color:#e0e0f8;letter-spacing:0.01em}
    .brand-text p{font-size:10px;color:#44445a;margin-top:1px}
    .toggle-btn{
      width:32px;height:18px;border-radius:9px;
      border:none;cursor:pointer;position:relative;
      transition:background 0.2s;flex-shrink:0;
    }
    .toggle-btn.on{background:linear-gradient(90deg,#a855f7,#22d3ee)}
    .toggle-btn.off{background:#1e1e35}
    .toggle-knob{
      position:absolute;top:2px;width:14px;height:14px;
      border-radius:50%;background:#fff;
      transition:left 0.2s;
    }
    .toggle-btn.on .toggle-knob{left:16px}
    .toggle-btn.off .toggle-knob{left:2px}

    .section{padding:12px 16px;border-bottom:1px solid #1a1a28}

    .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .label{font-size:11px;color:#6666aa}
    .input-group{display:flex;align-items:center;gap:6px}
    .num-input{
      width:44px;padding:4px 8px;
      background:#13132a;border:1px solid #2a2a45;
      border-radius:6px;color:#c8c8e8;
      font-size:12px;text-align:center;
      outline:none;
    }
    .num-input:focus{border-color:#7a5af8}
    .unit{font-size:11px;color:#44445a}

    .exc-label{
      font-size:10px;text-transform:uppercase;
      letter-spacing:0.08em;color:#44445a;margin-bottom:8px;
    }
    .domain-row{display:flex;gap:6px;margin-bottom:8px}
    .domain-input{
      flex:1;padding:5px 10px;
      background:#13132a;border:1px solid #2a2a45;
      border-radius:6px;color:#c8c8e8;font-size:11px;outline:none;
    }
    .domain-input::placeholder{color:#33334a}
    .domain-input:focus{border-color:#7a5af8}
    .add-btn{
      padding:5px 10px;background:#1a1a30;
      border:1px solid #2a2a45;border-radius:6px;
      color:#7a7aaa;font-size:13px;cursor:pointer;
    }
    .add-btn:hover{border-color:#7a5af8;color:#a78bfa}
    .tags{display:flex;flex-wrap:wrap;gap:4px;min-height:4px}
    .tag{
      display:inline-flex;align-items:center;gap:4px;
      background:#13132a;border:1px solid #2a2a45;
      border-radius:6px;padding:3px 8px;
    }
    .tag span{font-size:11px;color:#8888cc}
    .tag button{
      background:none;border:none;color:#44445a;
      font-size:12px;cursor:pointer;padding:0;line-height:1;
    }
    .tag button:hover{color:#f87171}

    .tabs-label{
      font-size:10px;text-transform:uppercase;
      letter-spacing:0.08em;color:#44445a;margin-bottom:8px;
    }
    .tab-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto}
    .tab-row{
      display:flex;align-items:center;gap:8px;
      padding:6px 10px;border-radius:8px;
      background:#13132a;border:1px solid #1e1e2e;
    }
    .tab-row.sleeping{opacity:0.45}
    .tab-row.sleeping .tab-domain{color:#33334a}
    .fav{width:13px;height:13px;border-radius:3px;flex-shrink:0}
    .tab-domain{
      flex:1;font-size:11px;color:#8888bb;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .badge{
      font-size:9px;font-weight:600;padding:2px 6px;
      border-radius:4px;letter-spacing:0.04em;flex-shrink:0;
    }
    .b-protected{background:#0e1a2e;color:#22d3ee;border:1px solid #1a3a4a}
    .b-risk{background:#2a1400;color:#f59e0b;border:1px solid #3a2400}
    .b-sleep{background:#0e0e22;color:#6666aa;border:1px solid #1e1e35;display:flex;align-items:center;gap:3px}
