<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Moontabs</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #07050f;
      --border: #2a1f4a;
      --bd2:    #1a1530;
      --purple: #7c3aed;
      --cyan:   #22d3ee;
      --text:   #d4d0f0;
      --muted:  #5a5580;
      --dim:    #2e2a50;
      --glow:   rgba(124,58,237,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px; height: 480px;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      position: relative;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    canvas#c {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 0;
    }

    .popup {
      position: absolute; inset: 0; z-index: 1;
      display: flex; flex-direction: column; height: 100%;
    }

    /* header */
    .hdr {
      flex-shrink: 0; position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 18px 14px 14px;
      border-bottom: 1px solid var(--bd2);
      background: rgba(7,5,15,0.8);
      cursor: pointer; user-select: none; overflow: hidden;
    }
    .hdr:active .icon-btn { transform: scale(0.92); }
    .watermark {
      position: absolute;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 38px; letter-spacing: 0.14em;
      color: rgba(124,58,237,0.12);
      white-space: nowrap; pointer-events: none; text-transform: uppercase;
    }
    .icon-btn {
      width: 52px; height: 52px; border-radius: 14px; object-fit: cover;
      position: relative; z-index: 1;
      transition: filter .4s ease, transform .15s ease;
      filter: drop-shadow(0 0 10px rgba(34,211,238,0.5));
    }
    .status-hint {
      position: absolute; bottom: 6px;
      font-size: 9px; letter-spacing: .08em;
      font-family: 'Syne', sans-serif; z-index: 1;
      transition: color .4s; color: var(--cyan);
    }

    /* OFF state */
    .popup.off .icon-btn    { filter: grayscale(1) brightness(0.35); }
    .popup.off .watermark   { color: rgba(80,80,80,0.07); }
    .popup.off .status-hint { color: var(--muted); }
    .popup.off .body-content{ filter: grayscale(1) brightness(0.3); pointer-events: none; }
    .body-content { transition: filter .4s ease; flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* settings */
    .sec {
      flex-shrink: 0; padding: 12px 14px;
      border-bottom: 1px solid var(--bd2);
      background: rgba(14,11,26,0.8);
      display: flex; flex-direction: column; gap: 10px;
    }
    .row { display: flex; align-items: center; gap: 8px; }
    .lbl { font-size: 11px; font-weight: 600; color: var(--text); white-space: nowrap; flex: 1; }

    .num-field {
      width: 52px; padding: 4px 8px;
      background: rgba(10,8,22,0.95); border: 1px solid var(--border);
      border-radius: 7px; color: #c4b5fd;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      text-align: center; outline: none; transition: border-color .15s;
      -moz-appearance: textfield;
    }
    .num-field::-webkit-inner-spin-button,
    .num-field::-webkit-outer-spin-button { -webkit-appearance: none; }
    .num-field:focus { border-color: var(--purple); box-shadow: 0 0 6px var(--glow); }
    .sunit { font-size: 10px; color: var(--muted); }

    /* exceptions */
    .exc-wrap { display: flex; flex-direction: column; gap: 6px; }
    .exc-row  { display: flex; gap: 6px; }
    .exc-in {
      flex: 1; padding: 5px 9px;
      background: rgba(10,8,22,0.95); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-size: 11px;
      font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .15s;
    }
    .exc-in::placeholder { color: #2a2248; }
    .exc-in:focus { border-color: var(--purple); }
    .pbtn {
      width: 28px; height: 28px; border-radius: 7px;
      border: 1px solid var(--border); background: rgba(26,21,53,0.9);
      color: var(--muted); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s; flex-shrink: 0;
    }
    .pbtn:hover { border-color: var(--purple); color: #c4b5fd; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; min-height: 4px; }
    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(19,15,36,0.95); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 8px 2px 10px;
      font-size: 10px; color: #a78bfa;
    }
    .tx {
      background: none; border: none; color: var(--dim);
      font-size: 12px; cursor: pointer; padding: 0; line-height: 1; transition: color .15s;
    }
    .tx:hover { color: #f87171; }

    /* tabs */
    .tabs-sec {
      flex: 1; padding: 10px 14px 0;
      background: rgba(7,5,15,0.6);
      display: flex; flex-direction: column; min-height: 0;
    }
    .tabs-hdr {
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: .1em; color: var(--muted); text-transform: uppercase;
      margin-bottom: 7px; flex-shrink: 0;
    }
    .tab-list {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 4px;
      padding-bottom: 10px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .ti {
      display: flex; align-items: center; gap: 7px; padding: 6px 9px;
      background: rgba(16,14,30,0.9); border: 1px solid var(--bd2);
      border-radius: 8px; flex-shrink: 0; transition: border-color .15s;
    }
    .ti:hover { border-color: var(--border); }
    .ti.sleeping { opacity: 0.4; }
    .tfav { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .ttitle { flex: 1; font-size: 11px; color: #9990cc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* badges */
    .badge { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; letter-spacing: .04em; flex-shrink: 0; }

    /* user exception / pinned / playing — NEVER closed */
    .b-prot    { background: #061b26; color: var(--cyan);  border: 1px solid #0e3040; }

    /* extension learned your pattern — not closing */
    .b-learned { background: #0e0b22; color: #a78bfa;      border: 1px solid #2a1f4a; }

    /* past 50% — closing soon */
    .b-risk    { background: #1f1000; color: #f59e0b;      border: 1px solid #3a2200; }

    /* fresh — dim countdown */
    .b-idle    { background: #0d0c1a; color: var(--muted); border: 1px solid #1e1b30; }

    /* already discarded */
    .b-sleep   { background: #0a0816; color: var(--muted); border: 1px solid var(--bd2); }

    /* active tab */
    .b-active  { background: #0e1a0e; color: #4ade80;      border: 1px solid #1a3a1a; }

    /* footer */
    .ftr {
      flex-shrink: 0; padding: 8px 14px; border-top: 1px solid var(--bd2);
      background: rgba(7,5,15,0.9);
      display: flex; align-items: center; justify-content: space-between;
    }
    .fstat { font-size: 10px; color: var(--muted); }
    .fstat strong { color: #a78bfa; }
    .savebtn {
      padding: 5px 14px;
      background: linear-gradient(90deg, var(--purple), #6d28d9);
      border: none; border-radius: 7px; color: #fff;
      font-size: 11px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      cursor: pointer; box-shadow: 0 0 10px var(--glow); transition: opacity .15s;
    }
    .savebtn:hover { opacity: .85; }
    .savebtn.saved { background: linear-gradient(90deg,#065f46,#047857); box-shadow: none; }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="popup" id="popup">

  <div class="hdr" id="hdrBtn">
    <span class="watermark">MOONTABS</span>
    <img class="icon-btn" src="icons/icon48.png" alt="Moontabs"/>
    <span class="status-hint" id="statusHint">active</span>
  </div>

  <div class="body-content">
    <div class="sec">

      <div class="row">
        <span class="lbl">Discard after</span>
        <input class="num-field" id="limitInput" type="number" min="1" max="999" step="1" value="5"/>
        <span class="sunit">mins</span>
      </div>

      <div class="row">
        <span class="lbl">Ignore gaps over</span>
        <input class="num-field" id="maxGapInput" type="number" min="1" max="24" step="1" value="8"/>
        <span class="sunit">hrs</span>
      </div>

      <div class="row">
        <span class="lbl">Ignore gaps under</span>
        <input class="num-field" id="minGapInput" type="number" min="1" max="3600" step="1" value="30"/>
        <span class="sunit">secs</span>
      </div>

      <div class="exc-wrap">
        <span class="lbl">Exceptions</span>
        <div class="exc-row">
          <input class="exc-in" id="domainInput" placeholder="eg. youtube.com"/>
          <button class="pbtn" id="addBtn">+</button>
        </div>
        <div class="tags" id="tags"></div>
      </div>

    </div>

    <div class="tabs-sec">
      <div class="tabs-hdr">Open Tabs</div>
      <div class="tab-list" id="tabList">
        <div style="font-size:11px;color:var(--muted);text-align:center;padding:16px 0">Loading…</div>
      </div>
    </div>

    <div class="ftr">
      <div class="fstat" id="footerStat">—</div>
      <button class="savebtn" id="saveBtn">Save</button>
    </div>
  </div>

</div>

<script src="stars.js"></script>
<script src="popup.js"></script>
</body>
</html>
