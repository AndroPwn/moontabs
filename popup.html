<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Tab Closer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 11px; color: #666; margin-bottom: 16px; }
    .section-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.08em; color: #555; margin-bottom: 8px;
    }
    .tab-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 360px; overflow-y: auto; margin-bottom: 16px;
    }
    .tab-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      background: #1a1a1a; border: 1px solid #222;
    }
    .tab-row.protected { border-color: #2a3a2a; background: #141a14; }
    .tab-row.active-tab { border-color: #2a2a3a; background: #14141a; }
    .favicon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.8; }
    .tab-info { flex: 1; min-width: 0; }
    .tab-domain {
      font-size: 12px; font-weight: 500; color: #ccc;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tab-meta { font-size: 10px; color: #555; margin-top: 2px; }
    .badge {
      font-size: 9px; font-weight: 600; padding: 2px 6px;
      border-radius: 4px; flex-shrink: 0;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-protected { background: #1a3a1a; color: #5a9a5a; border: 1px solid #2a4a2a; }
    .badge-active    { background: #1a1a3a; color: #5a5aaa; border: 1px solid #2a2a4a; }
    .badge-audible   { background: #3a1a1a; color: #aa5a5a; border: 1px solid #4a2a2a; }
    .badge-at-risk   { background: #2a1a00; color: #aa7a30; border: 1px solid #3a2a00; }
    .forget-btn {
      background: none; border: 1px solid #333; color: #555;
      font-size: 10px; padding: 2px 6px; border-radius: 4px; cursor: pointer;
    }
    .forget-btn:hover { border-color: #555; color: #888; }
    .empty { text-align: center; color: #444; padding: 24px 0; font-size: 12px; }
    .footer { font-size: 10px; color: #444; text-align: center; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
</head>
<body>
  <h1>Smart Tab Closer</h1>
  <p class="subtitle">Learning your tab habits. Closing the ones you forget.</p>
  <p class="section-label">Open tabs</p>
  <div class="tab-list" id="tab-list"><div class="empty">Loading…</div></div>
  <p class="footer" id="footer"></p>
  <script src="popup.js"></script>
</body>
</html>
